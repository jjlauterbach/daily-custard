name: Scraper Ecosystem Monitor

on:
  schedule:
    # 15:00 UTC = 10:00 AM US Central (CDT)
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ecosystem-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Run ecosystem scraper test
        run: |
          uv run pytest --ecosystem --log-level=DEBUG --log-file=ecosystem_test.log

      - name: Upload test log (optional)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ecosystem-test-log
          path: ecosystem_test.log

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = "ecosystem-test-failure";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const titlePrefix = "Ecosystem scraper test failure";

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100,
            });

            const existing = openIssues.find(
              (issue) => !issue.pull_request && issue.title.startsWith(titlePrefix)
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: [
                  "A new ecosystem test failure was detected.",
                  "",
                  `- Workflow run: ${runUrl}`,
                  `- Commit: ${context.sha}`,
                  `- Triggered by: ${context.eventName}`,
                ].join("\n"),
              });

              core.info(`Updated existing issue #${existing.number}`);
              return;
            }

            const today = new Date().toISOString().slice(0, 10);
            const created = await github.rest.issues.create({
              owner,
              repo,
              title: `${titlePrefix} (${today})`,
              body: [
                "The ecosystem scraper test failed.",
                "",
                `- Workflow run: ${runUrl}`,
                `- Commit: ${context.sha}`,
                `- Triggered by: ${context.eventName}`,
                "- Artifact: ecosystem-test-log",
                "",
                "This issue was opened automatically by the workflow.",
              ].join("\n"),
              labels: ["bug", label],
            });

            let assigned = false;
            for (const login of ["copilot", "copilot-swe-agent"]) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: created.data.number,
                  assignees: [login],
                });
                assigned = true;
                core.info(`Assigned issue #${created.data.number} to ${login}`);
                break;
              } catch (error) {
                core.warning(`Could not assign ${login}: ${error.message}`);
              }
            }

            if (!assigned) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: created.data.number,
                body: "Automatic Copilot assignment failed in this repository. Please verify Copilot coding agent is enabled and assign manually if needed.",
              });
            }

      - name: Send ntfy notification on failure
        if: failure()
        run: |
          curl -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN}}" \
               -H "Title: Daily Custard Scraper Ecosystem Test Failed" \
               -H "Priority: urgent" \
               -d "The daily scraper ecosystem test has failed. Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               ${{ secrets.NTFY_TOPIC_URL }}
